version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: clicked
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    # #49 — Healthcheck so dependants (and `docker compose up --wait`) can
    # gate on database readiness instead of racing the boot.
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d clicked"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    # #49 — Healthcheck via `redis-cli ping`. Same cadence as postgres so a
    # single `docker compose up --wait` reports both as `(healthy)` together.
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 2s

volumes:
  postgres_data:
  redis_data:
